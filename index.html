<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Video Fullscreen</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
    video {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <video autoplay playsinline>
    <source src="VID_20260413_024743.mp4" type="video/mp4">
  </video>
</body>
</html>
